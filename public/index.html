<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spy Movie - Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', monospace;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(10, 14, 23, 0.9);
            border-radius: 48px;
            padding: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .hidden { display: none !important; }
        .title {
            font-size: 2rem;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        input, button {
            padding: 12px 20px;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            width: 100%;
        }
        input { background: #1e2438; color: white; margin-bottom: 10px; }
        button { background: #2d3e5f; color: white; cursor: pointer; margin-top: 5px; }
        button:hover { background: #4a6a8f; }
        .players-list { display: flex; flex-wrap: wrap; gap: 15px; margin: 20px 0; justify-content: center; }
        .player-card { background: #1b212f; padding: 10px 25px; border-radius: 40px; border-left: 4px solid gold; }
        .character-card {
            background: #03060cee;
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ffc857;
            margin: 20px 0;
        }
        .spy-badge { background: #8b0000; color: #ffcc00; padding: 8px 20px; border-radius: 40px; display: inline-block; margin-top: 10px; }
        .question-box { background: #000000aa; border-radius: 32px; padding: 20px; margin: 20px 0; text-align: center; }
        .question-text { font-size: 1.3rem; color: #FFE5B4; margin-bottom: 15px; }
        .vote-option { background: #2a1e2c; padding: 10px 20px; border-radius: 40px; cursor: pointer; text-align: center; margin: 5px; }
        .vote-option:hover, .vote-option.selected { background: #c97e00; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .text-center { text-align: center; }
        .room-code { font-size: 1.5rem; font-weight: bold; background: #000000aa; padding: 10px 20px; border-radius: 20px; }
        .copy-btn { background: #3a5a3a; width: auto; }
        .vote-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- ЛОББИ -->
    <div id="lobbyScreen">
        <h1 class="title">🕵️‍♂️ SPY MOVIE 🎬</h1>
        <p class="text-center" style="color:#ccc;">One player is the spy. Find them!</p>
        <div style="display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap;">
            <div style="flex:1; background:#11161f; padding:20px; border-radius:32px;">
                <h3 class="text-center">🎭 Create Room</h3>
                <input type="text" id="createName" placeholder="Your name">
                <button id="createBtn">➕ CREATE ROOM</button>
            </div>
            <div style="flex:1; background:#11161f; padding:20px; border-radius:32px;">
                <h3 class="text-center">🔗 Join Room</h3>
                <input type="text" id="joinCode" placeholder="Room Code">
                <input type="text" id="joinName" placeholder="Your name">
                <button id="joinBtn">🚪 JOIN GAME</button>
            </div>
        </div>
    </div>

    <!-- КОМНАТА -->
    <div id="roomScreen" class="hidden">
        <div class="flex-between">
            <span class="room-code" id="roomCodeDisplay">---</span>
            <button id="copyCodeBtn" class="copy-btn">📋 Copy</button>
        </div>
        <div id="playersList" class="players-list"></div>
        <p id="roomMessage" class="text-center" style="color:#ffaa66;"></p>
        <button id="startGameBtn">🎞️ START GAME</button>
        <button id="leaveRoomBtn" style="margin-top:10px; background:#3a2a2a;">🚪 Leave Room</button>
    </div>

    <!-- ИГРА -->
    <div id="gameScreen" class="hidden">
        <div class="character-card">
            <div style="font-size:48px" id="charEmoji">🎭</div>
            <div id="charMovie" style="font-size:1.3rem; font-weight:bold;">????</div>
            <div id="charActor">???</div>
            <div id="charSpyBadge" class="spy-badge hidden">⚠️ YOU ARE THE SPY! ⚠️</div>
        </div>

        <div class="question-box">
            <div class="question-text">Discuss: Who seems suspicious? What do you know about the movie?</div>
            <div id="voteContainer" class="vote-grid"></div>
        </div>

        <div id="gameMsg" style="background:#221c0e; border-radius:20px; padding:10px; margin-top:15px; text-align:center;"></div>
        <button id="quitGameBtn" style="margin-top:10px; background:#3a2a2a;">🏠 Quit to Lobby</button>
    </div>
</div>

<script>
    const socket = io();
    let currentRoom = null;
    let myPlayer = null;
    let currentMovie = null;
    let isSpy = false;
    let hasVoted = false;

    // Elements
    const lobbyScreen = document.getElementById('lobbyScreen');
    const roomScreen = document.getElementById('roomScreen');
    const gameScreen = document.getElementById('gameScreen');
    const playersList = document.getElementById('playersList');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');

    // Create Room
    document.getElementById('createBtn').onclick = () => {
        const name = document.getElementById('createName').value.trim();
        if (name) socket.emit('createRoom', name);
    };

    // Join Room
    document.getElementById('joinBtn').onclick = () => {
        const code = document.getElementById('joinCode').value.trim();
        const name = document.getElementById('joinName').value.trim();
        if (code && name) socket.emit('joinRoom', { code, name });
    };

    // Start Game
    document.getElementById('startGameBtn').onclick = () => {
        if (currentRoom) socket.emit('startGame', currentRoom);
    };

    // Leave Room
    document.getElementById('leaveRoomBtn').onclick = () => {
        location.reload();
    };

    document.getElementById('quitGameBtn').onclick = () => {
        location.reload();
    };

    // Copy Code
    document.getElementById('copyCodeBtn').onclick = () => {
        navigator.clipboard.writeText(currentRoom);
        alert('Room code copied: ' + currentRoom);
    };

    // Socket Events
    socket.on('roomCreated', (data) => {
        currentRoom = data.roomCode;
        myPlayer = data.player;
        showRoom(data.roomCode, [myPlayer]);
    });

    socket.on('joinedRoom', (data) => {
        currentRoom = data.roomCode;
        myPlayer = data.player;
        showRoom(data.roomCode, []);
    });

    socket.on('updatePlayers', (players) => {
        renderPlayers(players);
        const startBtn = document.getElementById('startGameBtn');
        if (startBtn) {
            startBtn.classList.remove('hidden');
        }
    });

    socket.on('gameStarted', (data) => {
        currentMovie = data.movie;
        isSpy = (socket.id === data.spyId);
        
        lobbyScreen.classList.add('hidden');
        roomScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        if (isSpy) {
            document.getElementById('charMovie').innerText = "????";
            document.getElementById('charActor').innerText = "????";
            document.getElementById('charEmoji').innerText = "🕵️";
            document.getElementById('charSpyBadge').classList.remove('hidden');
        } else {
            document.getElementById('charMovie').innerText = data.movie.movie;
            document.getElementById('charActor').innerText = data.movie.actor;
            document.getElementById('charEmoji').innerText = data.movie.emoji;
            document.getElementById('charSpyBadge').classList.add('hidden');
        }
        
        // Создаем кнопки для голосования
        const voteContainer = document.getElementById('voteContainer');
        voteContainer.innerHTML = '<h3 style="color:white;">Vote for the spy:</h3>';
        data.players.forEach(player => {
            if (player.id !== socket.id) {
                const btn = document.createElement('button');
                btn.className = 'vote-option';
                btn.innerText = `🗳️ ${player.name}`;
                btn.onclick = () => {
                    if (hasVoted) {
                        document.getElementById('gameMsg').innerHTML = 'You already voted!';
                        return;
                    }
                    socket.emit('submitVote', { roomCode: currentRoom, targetId: player.id });
                    hasVoted = true;
                    document.getElementById('gameMsg').innerHTML = 'Vote submitted! Waiting for others...';
                    btn.disabled = true;
                };
                voteContainer.appendChild(btn);
            }
        });
    });

    socket.on('voteCast', (data) => {
        document.getElementById('gameMsg').innerHTML = `Vote received! (${data.total}/${data.needed} votes)`;
    });

    socket.on('voteResult', (data) => {
        if (data.isSpy) {
            document.getElementById('gameMsg').innerHTML = `🕵️‍♂️ ${data.eliminatedName} was the SPY! Civilians win! 🎉`;
        } else {
            document.getElementById('gameMsg').innerHTML = `❌ ${data.eliminatedName} was innocent... The spy wins!`;
        }
        document.getElementById('voteContainer').innerHTML = '<p style="color:gold;">Game Over!</p>';
    });

    socket.on('gameEnd', (data) => {
        document.getElementById('gameMsg').innerHTML = data.message;
        document.getElementById('voteContainer').innerHTML = '<p style="color:gold;">Game Over! Refresh to play again.</p>';
    });

    socket.on('error', (msg) => {
        alert(msg);
    });

    function showRoom(code, players) {
        lobbyScreen.classList.add('hidden');
        roomScreen.classList.remove('hidden');
        gameScreen.classList.add('hidden');
        roomCodeDisplay.innerText = code;
        if (players.length) renderPlayers(players);
    }

    function renderPlayers(players) {
        playersList.innerHTML = players.map(p => `
            <div class="player-card">
                ${p.isHost ? '👑' : '👤'} ${p.name}
            </div>
        `).join('');
    }
</script>
</body>
</html>
